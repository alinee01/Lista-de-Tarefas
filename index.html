<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tarefas</title>
    <style>
        :root {
            --bg: #f5f7ff;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --primary: #2563eb;
            --danger: #dc2626;
            --border: #e2e8f0;
            --success: #10b981;
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: linear-gradient(180deg, #eef2ff 0%, #f8fafc 100%);
            color: var(--text);
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 16px;
        }
        .app {
            width: min(100%, 600px);
            background: var(--card);
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
            border: 1px solid #e6eaf4;
            padding: 24px;
        }
        h1 { margin: 0 0 10px; font-size: 1.9rem; text-align: center; }
        .subtitle { margin: 0 0 18px; color: var(--muted); text-align: center; }
        .form-row { display: flex; gap: 10px; margin-bottom: 14px; }
        .form-row input {
            flex: 1;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 0.95rem;
            outline: none;
        }
        .form-row input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
        .form-row button {
            border: none;
            border-radius: 10px;
            background: var(--primary);
            color: white;
            font-weight: 600;
            padding: 0 14px;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        .form-row button:hover { background: #1d4ed8; }
        .list {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .item {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .item .check {
            width: 18px;
            height: 18px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            display: inline-grid;
            place-items: center;
            cursor: pointer;
            background: white;
        }
        .item .check.checked { background: #10b981; border-color: #10b981; color: white; }
        .item .task-text { flex: 1; word-break: break-word; }
        .item .task-text.done { text-decoration: line-through; color: #9ca3af; }
        .item button {
            border: 0;
            background: transparent;
            color: #ef4444;
            font-weight: 700;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 6px;
            transition: background-color 0.2s;
        }
        .item button:hover { background: #fee2e2; }
        .stats { margin-top: 12px; color: #4b5563; font-size: 0.9rem; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <main class="app" aria-label="Aplicativo de tarefas">
        <h1>Minhas Tarefas!</h1>
        <p class="subtitle">Adicione tarefas, marque como concluída e elas serão salvas automaticamente.</p>
        <form id="taskForm" class="form-row">
            <input id="taskInput" type="text" placeholder="Digite sua tarefa..." autocomplete="off" aria-label="Nova tarefa">
            <button type="submit">Adicionar</button>
        </form>
        <ul id="taskList" class="list"></ul>
        <p id="emptyMessage" class="stats">Nenhuma tarefa ainda. Adicione uma tarefa para começar.</p>
        <p id="stats" class="stats hidden"></p>
    </main>

    <script>
        const taskForm = document.getElementById('taskForm');
        const taskInput = document.getElementById('taskInput');
        const taskList = document.getElementById('taskList');
        const stats = document.getElementById('stats');
        const emptyMessage = document.getElementById('emptyMessage');
        const STORAGE_KEY = 'tarefas-v1';

        let tasks = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

        function saveTasks() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
        }

        function render() {
            taskList.innerHTML = '';
            if (tasks.length === 0) {
                emptyMessage.classList.remove('hidden');
                stats.classList.add('hidden');
                return;
            }
            emptyMessage.classList.add('hidden');
            tasks.forEach((task, index) => {
                const li = document.createElement('li');
                li.className = 'item';

                const check = document.createElement('button');
                check.className = 'check' + (task.done ? ' checked' : '');
                check.setAttribute('aria-label', task.done ? 'Marcar não concluída' : 'Marcar concluída');
                check.innerHTML = task.done ? '✓' : '';
                check.addEventListener('click', () => {
                    tasks[index].done = !tasks[index].done;
                    saveTasks();
                    render();
                });

                const span = document.createElement('span');
                span.className = 'task-text' + (task.done ? ' done' : '');
                span.textContent = task.text;

                const deleteButton = document.createElement('button');
                deleteButton.textContent = 'Excluir';
                deleteButton.addEventListener('click', () => {
                    tasks.splice(index, 1);
                    saveTasks();
                    render();
                });

                li.append(check, span, deleteButton);
                taskList.appendChild(li);
            });

            const completed = tasks.filter(t => t.done).length;
            stats.textContent = `Total: ${tasks.length} | Concluídas: ${completed}`;
            stats.classList.remove('hidden');
        }

        taskForm.addEventListener('submit', (event) => {
            event.preventDefault();
            const text = taskInput.value.trim();
            if (!text) return;
            tasks.unshift({ text, done: false, createdAt: Date.now() });
            taskInput.value = '';
            saveTasks();
            render();
        });

        render();
    </script>
</body>
</html>
